<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องเล่นวิดีโอผ่าน GitHub Pages</title>
    <!-- โหลดสคริปต์สำหรับเล่นไฟล์สตรีม .m3u8 (HLS) -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
        }
        .video-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        video {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="video-container">
    <!-- ตัวเล่นวิดีโอ HTML5 -->
    <video id="video" controls></video>
</div>

<script>
    var video = document.getElementById('video');
    
    // โครงสร้างคือเอา https://corsproxy.io มาต่อด้านหน้าลิงก์วิดีโอของคุณแบบนี้ครับ
    var videoSrc = 'https://corsproxy.io/?url=http://54.37.19.157/history/tracks-v1a1/mono.m3u8';

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    } 
    // สำหรับเบราว์เซอร์ตระกูล Apple (Safari / iOS) ที่รองรับ .m3u8 ในตัวอยู่แล้ว
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    }
</script>

</body>
</html>
