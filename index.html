<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ทดสอบเล่นวิดีโอผ่าน GitHub Pages</title>
    <!-- โหลดไลบรารี HLS.js -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <video id="video" controls width="640" height="360"></video>

    <script>
        var video = document.getElementById('video');
        
        // ใช้ลิงก์ใหม่ที่ต่อหัวด้วย CORS Proxy เพื่อแก้ปัญหา HTTPS และ CORS
        var videoSrc = 'https://corsproxy.io/?url=http://54.37.19.157/history/tracks-v1a1/mono.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>

</body>
</html>
