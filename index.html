<style>

<script>

// ==========================================
// PLAYLIST DATA (รองรับ .m3u8, .mpd และ DRM)
// ==========================================

const m3uData = `
#EXTINF:-1 group-title="ช่องดิจิตอล" tvg-logo="https://ais-vidnt.com",CH3 HD
https://sky-cdn.com

#EXTINF:-1 group-title="ช่องดิจิตอล" tvg-logo="https://ais-vidnt.com",CH5 HD
https://sky-cdn.com

#EXTINF:-1 group-title="🎞️ หนังภาพยนตร์" tvg-logo="https://jtvnw.net",RED BULL TV
https://akamaized.net

#EXTINF:-1 group-title="Newsข่าว" tvg-logo="https://imgur.com",Top News
https://topnews.co.th

#EXTINF:-1 group-title="สารคดี" tvg-logo="https://placeholder.com",Fishing Tv
https://frequency.stream

#EXTINF:-1 group-title="🔒 ช่อง DRM" tvg-logo="https://placeholder.com" kid="ใส่ค่า KeyID ของคุณตรงนี้" key="ใส่ค่า Key ของคุณตรงนี้",ตัวอย่างช่อง MPD DRM (ClearKey)
http://ตัวอย่างลิงก์สตรีมมิ่ง/manifest.mpd
`;

// ==========================================
// GLOBAL VARIABLES
// ==========================================

const playlist=document.getElementById("playlist");
const playlistWrapper=document.getElementById("playlistWrapper");
const current=document.getElementById("current");
const fallbackVideo=document.getElementById("fallbackVideo");
const groupsContainer=document.getElementById("groups");

let channels=[];
let displayedChannels=[]; // เก็บรายการช่องที่สะท้อนอยู่บนหน้าจอจริง
let jw=null;
let hls=null;
let dashPlayer=null; // เครื่องเล่นสำหรับ MPD (DASH)
let currentChannel=null;

// ระบบควบคุมตำแหน่งโฟกัสของรีโมท Android TV
let focusArea = "playlist"; // สลับระหว่าง "groups" และ "playlist"
let activeGroupIndex = 0;
let activeChannelIndex = 0;

// ==========================================
// PARSE M3U (คัดกรองลิงก์และตรวจจับข้อมูล DRM)
// ==========================================

function parseM3U(text){
    const lines=text.split("\n");
    const result=[];
    
    let name="";
    let logo="";
    let group="อื่นๆ";
    let drm=false;
    let keyId="";
    let key="";

    for(const line of lines){
        const l=line.trim();
        if(!l) continue;

        if(l.startsWith("#EXTINF")){
            const g=l.match(/group-title="([^"]+)"/);
            const lg=l.match(/tvg-logo="([^"]+)"/);
            
            // อ่านค่ารหัสปลดล็อก DRM ClearKey (kid / key) จากแท็กบรรทัด M3U
            const kidMatch=l.match(/kid="([^"]+)"/);
            const keyMatch=l.match(/key="([^"]+)"/);

            group=g ? g[1] : "อื่นๆ";
            logo=lg ? lg[1] : "";
            keyId=kidMatch ? kidMatch[1] : "";
            key=keyMatch ? keyMatch[1] : "";
            drm=(keyId !== "" && key !== "");

            name=l.split(",").pop().trim();
        }
        else if(l.startsWith("http")){
            // ถ้าชื่อไฟล์ลงท้ายด้วย .mpd แต่ไม่มีการระบุคีย์ ให้เปิดระบบรองรับวิดีโอรูปแบบ MPD รอไว้ก่อน
            if(l.toLowerCase().includes(".mpd") && !keyId) {
                drm = true; 
            }

            result.push({
                name: name || "Unknown Channel",
                logo,
                group,
                url:l,
                drm,
                keyId,
                key
            });
            
            // ล้างค่าตัวแปรเพื่อวนลูปอ่านช่องถัดไป
            name=""; logo=""; drm=false; keyId=""; key="";
        }
    }
    return result;
}

// ==========================================
// RESET ALL PLAYERS (เคลียร์เครื่องเล่นเดิมทิ้ง)
// ==========================================

function resetPlayers() {
    if(jw) { try{ jw.stop(); }catch(e){} }
    if(hls){ hls.destroy(); hls=null; }
    if(dashPlayer){ dashPlayer.destroy(); dashPlayer=null; }
    
    fallbackVideo.pause();
    fallbackVideo.removeAttribute("src");
    fallbackVideo.load();
}

// ==========================================
// PLAY CHANNEL FUNCTION (รองรับ MPD/DRM/HLS/JW)
// ==========================================

function playChannel(channel){
    currentChannel=channel;
    localStorage.setItem("lastChannel", JSON.stringify(channel));
    current.textContent="กำลังเล่น : "+channel.name;

    // เปลี่ยนสีไฮไลต์ในรายการช่องให้รู้ว่าเล่นช่องนี้อยู่
    document.querySelectorAll(".item").forEach(el=>el.classList.remove("active-channel"));
    const active=document.querySelector(`[data-url="${channel.url}"]`);
    if(active) active.classList.add("active-channel");

    // ล้างและหยุดเครื่องเล่นทั้งหมดก่อนเริ่มโหลดช่องใหม่
    resetPlayers();

    const url=channel.url.toLowerCase();

    // 1. ตรวจสอบเงื่อนไขว่าเป็นไฟล์วิดีโอตระกูล MPD หรือมีรหัสป้องกัน DRM
    if(url.includes(".mpd") || channel.drm){
        document.getElementById("player").style.display="none";
        fallbackVideo.style.display="block";

        dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(fallbackVideo, channel.url, true);

        // หากช่องนี้มีค่ารหัส ClearKey ให้ทำการ Inject คีย์เพื่อปลดล็อกไฟล์วิดีโอทันที
        if(channel.keyId && channel.key) {
            const protectionData = {
                "org.w3.clearkey": {
                    "clearkeys": {
                        [channel.keyId]: channel.key
                    }
                }
            };
            dashPlayer.setProtectionData(protectionData);
        }
    }
    // 2. หากเป็นไฟล์สตรีมมิ่งประเภท HLS (.m3u8) ให้ใช้ hls.js รันผ่าน Native HTML5 Video
    else if(url.includes(".m3u8")){
        document.getElementById("player").style.display="none";
        fallbackVideo.style.display="block";

        if(Hls.isSupported()){
            hls=new Hls({ enableWorker:true, lowLatencyMode:true });
            hls.loadSource(channel.url);
            hls.attachMedia(fallbackVideo);
            hls.on(Hls.Ev}
}
</script>
