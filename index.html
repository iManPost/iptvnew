<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Live Stream Player</title>
    <!-- โหลดไลบรารี hls.js เพื่อให้เบราว์เซอร์ทั่วไปเล่นไฟล์ .m3u8 ได้ -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { width: 100%; max-width: 800px; height: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <video id="video" controls autoplay playsinline></video>

    <script>
        const videoSrc = 'http://54.37.19.157/history/tracks-v1a1/mono.m3u8';
        const video = document.getElementById('video');

        if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function (xhr, url) {
                    // จำลอง User-Agent ตามที่ลิงก์กำหนดไว้
                    xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36');
                }
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // สำหรับ Safari บน Mac/iOS ที่รองรับ HLS โดยตรง
            video.src = videoSrc;
        }
    </script>
</body>
</html>
