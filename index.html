<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Player (ฝัง M3U URL)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background-color: #2c2c2c; display: flex; flex-direction: column; border-right: 1px solid #444; transition: transform 0.3s ease; }
        #sidebar.hidden { transform: translateX(-100%); position: absolute; height: 100%; z-index: 1000; }
        .sidebar-header { padding: 16px 20px; text-align: center; background-color: #ffcc00; color: #000; font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: none; border: none; font-size: 1.5em; cursor: pointer; display: none; }
        #channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; transition: background 0.2s; }
        .channel-item:hover { background-color: #444; }
        .channel-item img { width: 40px; height: 40px; margin-right: 10px; object-fit: contain; background: #fff; border-radius: 4px; padding: 2px; }
        .channel-item span { font-size: 0.9em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        .category-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 10px; 
            background-color: #3a3a3a; 
            color: #ffcc00; 
            font-weight: bold; 
            cursor: pointer; 
            border-bottom: 1px solid #555; 
            user-select: none;
            transition: background-color 0.2s;
        }
        .category-header:hover { background-color: #444; }
        .category-header.active { background-color: #555; }
        .category-toggle { font-size: 1.2em; transition: transform 0.3s; }
        .category-toggle.collapsed { transform: rotate(-90deg); }
        .category-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out; 
            background-color: #2a2a2a; 
        }
        .category-content.expanded { 
            max-height: 500px; 
            overflow-y: auto; 
        }
        .channel-item.selected {
            background-color: #ff0000 !important;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        #top-bar { padding: 10px 20px; background-color: #2c2c2c; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        #menu-toggle { background: none; border: none; color: white; font-size: 1.5em; cursor: pointer; }
        #current-channel-name { flex: 1; font-weight: bold; }
        .refresh-btn {
            background: #ffcc00;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .status-cache {
            font-size: 0.7rem;
            background: #444;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        #video-container { flex: 1; background: #000; position: relative; display: flex; justify-content: center; align-items: center; }
        video, #jw-player-div { width: 100%; height: 100%; }

        #player-status {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: #00ff00;
            padding: 5px 10px; border: 1px solid #00ff00; border-radius: 4px;
            font-size: 14px; pointer-events: none; z-index: 9999; display: none;
        }

        #player-controls {
            padding: 15px; background-color: #222;
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .player-select-btn {
            background-color: #ffcc00; border: none; padding: 8px 16px; border-radius: 4px;
            cursor: pointer; font-weight: bold; color: #000;
        }
        .player-select-btn.active { background-color: #ff0000; color: #fff; }
        .loading-text { text-align: center; color: #aaa; padding: 20px; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; z-index: 1000; height: 100%; transform: translateX(-100%); }
            #sidebar.active { transform: translateX(0); }
            .close-btn { display: block; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>jwplayer.key = 'ITWMv7t88JGzI0xPwW8I0+LveiXX9SWbfdmt0ArUSyc=';</script>
    <script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
       เลือกช่อง ซีรีย์
        <button class="close-btn" onclick="toggleSidebar()">×</button>
    </div>
    <div id="channel-list"><div class="loading-text">กำลังโหลดข้อมูล...</div></div>
</div>

<div id="main-content">
    <div id="top-bar">
        <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span id="current-channel-name">เลือกช่องจากเมนูซ้าย</span>
        <button id="hardRefreshBtn" class="refresh-btn"> โหลด Playlist </button>
        <span id="cacheIndicator" class="status-cache"></span>
    </div>

    <div id="video-container">
        <div id="player-status"></div>
        <video id="shaka-video" controls autoplay style="display:none; width:100%; height:100%;"></video>
        <video id="hls-video" controls style="display:none; width:100%; height:100%;"></video>
        <video id="vjs-video" class="video-js vjs-default-skin" controls style="display:none; width:100%; height:100%;"></video>
        <div id="jw-player-div" style="display:none;"></div>
    </div>

    <div id="player-controls">
        <button class="player-select-btn" onclick="changePlayer('wiseplay', this)"> ตัวเล่น Wiseplay</button>
        <button class="player-select-btn active" onclick="changePlayer('mx', this)"> ตัวเล่น MXPlayer</button>
        <button class="player-select-btn active" onclick="changePlayer('mx', this)"> ตัวเล่น HLS</button>
    </div>
</div>

<script>
    // ======================== 🔧 แก้ไข URL ของ M3U Playlist ได้ตรงนี้ ========================
    // เพียงแค่เปลี่ยนลิงก์ด้านล่างเป็นลิงก์ M3U ที่คุณต้องการ (รองรับลิงก์ Dropbox, Google Drive, URL github ทั่วไป)
    const M3U_PLAYLIST_URL = 'https://dl.dropbox.com/scl/fi/0ya3v0t2j3icvx5cx0glo/Seriesday-10.m3u?rlkey=9ynt6ytm54v1cmfhjpjc4b0m9&dl=1';
    // ======================================================================================
    
    // Proxy List สำหรับ bypass CORS (หากจำเป็น)
    const PROXY_LIST = [
        'https://corsproxy.io/?url=',
        'https://api.allorigins.win/raw?url=',
        'https://cors-anywhere.herokuapp.com/',
        'https://proxy.cors.sh/',
        'https://api.codetabs.com/v1/proxy?quest='
    ];
    
    // Cache configuration (แยกตาม URL อัตโนมัติ)
    const CACHE_TTL = 30 * 60 * 1000; // 30 นาที
    
    let channels = [];
    let categories = {};
    let currentPlayer = 'mx';
    let currentUrl = '';
    let currentChannelId = null;
    let currentOpenCategory = null;
    let shakaInstance = null;
    let jwInstance = null;
    let videoJsPlayer = null;
    let hlsObj = null;
    
    // Helper: แปลง Dropbox URL เป็น Direct Raw Link
    function convertToDirectRawUrl(url) {
        if (url.includes('dropbox.com')) {
            let newUrl = url.replace('?dl=1', '?raw=1').replace('?dl=0', '?raw=1');
            newUrl = newUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
            newUrl = newUrl.replace('dropbox.com', 'dl.dropboxusercontent.com');
            return newUrl;
        }
        return url;
    }
    
    async function fetchWithTimeout(url, timeoutMs = 15000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const response = await fetch(url, { signal: controller.signal, mode: 'cors' });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }
    
    // สร้าง cache key โดยใช้ URL ปัจจุบัน (เมื่อคุณเปลี่ยน URL ในตัวแปรข้างบน cache key จะเปลี่ยนอัตโนมัติ)
    function getCacheKey() {
        return 'm3u_cache_' + btoa(M3U_PLAYLIST_URL).substring(0, 50);
    }
    
    function clearCache() {
        const cacheKey = getCacheKey();
        localStorage.removeItem(cacheKey);
        console.log('🗑️ ล้าง cache สำหรับ URL ปัจจุบัน');
    }
    
    async function loadM3UContent(forceRefresh = false) {
        const cacheKey = getCacheKey();
        
        if (!forceRefresh) {
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { timestamp, data } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_TTL && data && data.length > 100) {
                        console.log('📦 ใช้ cache');
                        return data;
                    }
                } catch(e) {}
            }
        } else {
            clearCache();
        }
        
        const rawUrl = convertToDirectRawUrl(M3U_PLAYLIST_URL);
        console.log('🔄 โหลดจาก:', rawUrl);
        
        // Direct fetch (ถ้าเป็น raw dropbox)
        try {
            const directData = await fetchWithTimeout(rawUrl, 10000);
            if (directData && (directData.includes('#EXTM3U') || directData.includes('#EXTINF'))) {
                localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: directData }));
                return directData;
            }
        } catch (e) { console.warn('Direct ล้มเหลว', e.message); }
        
        // Proxy พร้อมกัน
        const proxyTasks = PROXY_LIST.map(async (proxy) => {
            const proxyUrl = proxy + encodeURIComponent(rawUrl);
            const data = await fetchWithTimeout(proxyUrl, 14000);
            if (!data || data.length < 50) throw new Error('Data too short');
            if (!data.includes('#EXTM3U') && !data.includes('#EXTINF')) throw new Error('Not M3U');
            return data;
        });
        
        try {
            const result = await Promise.any(proxyTasks);
            localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: result }));
            return result;
        } catch (aggregateError) {
            const oldCache = localStorage.getItem(cacheKey);
            if (oldCache) {
                try {
                    const { data } = JSON.parse(oldCache);
                    if (data && data.length > 100) return data;
                } catch(e) {}
            }
            throw new Error('ไม่สามารถโหลด M3U ได้');
        }
    }
    
    async function fetchAndParsePlaylist(forceRefresh = false) {
        const listElement = document.getElementById('channel-list');
        try {
            listElement.innerHTML = '<div class="loading-text">📡 กำลังโหลดรายการช่อง...<br><span style="font-size:0.8rem;">อาจใช้เวลา 5-10 วินาที</span></div>';
            document.getElementById('cacheIndicator').innerHTML = '⏳ กำลังโหลด...';
            const m3uText = await loadM3UContent(forceRefresh);
            parseM3U(m3uText);
            document.getElementById('cacheIndicator').innerHTML = '✅ โหลดสำเร็จ';
            setTimeout(() => {
                if(document.getElementById('cacheIndicator').innerHTML === '✅ โหลดสำเร็จ')
                    document.getElementById('cacheIndicator').innerHTML = '✅สถานะ:สำเร็จ';
            }, 3000);
        } catch (error) {
            console.error(error);
            listElement.innerHTML = `<div class="loading-text" style="color:#ff8888">❌ โหลด Playlist ล้มเหลว<br><span style="font-size:0.8rem;">${error.message}</span><br><button onclick="fetchAndParsePlaylist(true)" style="margin-top:10px;background:#ffcc00;border:none;padding:6px 12px;border-radius:20px;">🔄 ลองอีกครั้ง (ไม่ใช้แคช)</button></div>`;
            document.getElementById('cacheIndicator').innerHTML = '❌ ล้มเหลว';
        }
    }
    
    function parseM3U(m3uText) {
        channels = [];
        categories = {};
        const lines = m3uText.split(/\r?\n/);
        let channelId = 1;
        let currentGroup = 'ทั่วไป';
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                let currentChannel = {};
                const extinfLine = line;
                const commaIndex = extinfLine.lastIndexOf(',');
                if (commaIndex !== -1) {
                    currentChannel.name = extinfLine.substring(commaIndex + 1).trim() || 'ไม่ระบุชื่อ';
                } else {
                    currentChannel.name = 'Unknown Channel';
                }
                const logoMatch = extinfLine.match(/tvg-logo="([^"]*)"/i) || extinfLine.match(/tvg-logo=([^" ]+)/i);
                currentChannel.logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/50?text=TV';
                const groupMatch = extinfLine.match(/group-title="([^"]*)"/i) || extinfLine.match(/group-title=([^" ]+)/i);
                currentGroup = groupMatch ? groupMatch[1].trim() : 'ทั่วไป';
                currentChannel.category = currentGroup;
                currentChannel.id = 'channel-' + channelId++;
                
                if (i + 1 < lines.length) {
                    let nextLine = lines[i + 1].trim();
                    if (nextLine && !nextLine.startsWith('#')) {
                        currentChannel.url = nextLine;
                        channels.push(currentChannel);
                        if (!categories[currentGroup]) categories[currentGroup] = [];
                        categories[currentGroup].push(currentChannel);
                        i++;
                    }
                }
            }
        }
        
        console.log(`✅ พบ ${channels.length} ช่อง`);
        if (channels.length === 0) {
            document.getElementById('channel-list').innerHTML = '<div class="loading-text" style="color:#ff8888">ไม่พบรายการช่องในไฟล์ M3U (รูปแบบไม่ถูกต้อง)</div>';
            return;
        }
        renderCategories();
    }
    
    function renderCategories() {
        var list = document.getElementById('channel-list');
        list.innerHTML = '';
        var sortedCategories = Object.keys(categories).sort((a, b) => {
            const priority = { 'digital tv':1, 'ทีวีดิจิตอล':1, 'tv':2, 'ทีวี':2, 'news':3, 'ข่าว':3, 'sport':4, 'กีฬา':4, 'movie':5, 'หนัง':5 };
            let pa = priority[a.toLowerCase()] || 99;
            let pb = priority[b.toLowerCase()] || 99;
            if(pa !== pb) return pa - pb;
            return a.localeCompare(b);
        });
        
        sortedCategories.forEach((catName, idx) => {
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            const catId = 'cat-' + catName.replace(/[^a-z0-9]/gi, '-');
            catDiv.id = catId;
            const header = document.createElement('div');
            header.className = 'category-header';
            if (idx === 0) header.classList.add('active');
            header.setAttribute('data-category', catId);
            header.onclick = function() { toggleCategory(this); };
            const titleSpan = document.createElement('span');
            titleSpan.innerText = `${catName} (${categories[catName].length})`;
            const toggleSpan = document.createElement('span');
            toggleSpan.className = 'category-toggle';
            toggleSpan.innerText = idx === 0 ? '▼' : '▶';
            if (idx !== 0) toggleSpan.classList.add('collapsed');
            header.appendChild(titleSpan);
            header.appendChild(toggleSpan);
            const contentDiv = document.createElement('div');
            contentDiv.className = 'category-content';
            if (idx === 0) contentDiv.classList.add('expanded');
            categories[catName].forEach(ch => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.id = ch.id;
                item.onclick = (function(channel) { return function() { selectChannel(channel, this); }; })(ch);
                const img = document.createElement('img');
                img.src = ch.logo;
                img.onerror = function() { this.src = 'https://via.placeholder.com/50x50/333/fff?text=' + encodeURIComponent(ch.name.substring(0,2).toUpperCase()); };
                const span = document.createElement('span');
                span.innerText = ch.name;
                item.appendChild(img);
                item.appendChild(span);
                contentDiv.appendChild(item);
            });
            catDiv.appendChild(header);
            catDiv.appendChild(contentDiv);
            list.appendChild(catDiv);
        });
        
        const summary = document.createElement('div');
        summary.className = 'loading-text';
        summary.style.fontSize = '12px';
        summary.innerText = `✅ โหลดสำเร็จ: ${sortedCategories.length} หมวด, ${channels.length} ช่อง`;
        list.appendChild(summary);
    }
    
    function toggleCategory(headerElem) {
        const catId = headerElem.getAttribute('data-category');
        const catDiv = document.getElementById(catId);
        const content = catDiv.querySelector('.category-content');
        const toggle = headerElem.querySelector('.category-toggle');
        if (content.classList.contains('expanded')) {
            content.classList.remove('expanded');
            toggle.classList.add('collapsed');
            toggle.innerText = '▶';
            headerElem.classList.remove('active');
            currentOpenCategory = null;
        } else {
            if (currentOpenCategory) {
                const prevCat = document.getElementById(currentOpenCategory);
                if (prevCat) {
                    const prevContent = prevCat.querySelector('.category-content');
                    const prevToggle = prevCat.querySelector('.category-toggle');
                    const prevHeader = prevCat.querySelector('.category-header');
                    if (prevContent) prevContent.classList.remove('expanded');
                    if (prevToggle) { prevToggle.classList.add('collapsed'); prevToggle.innerText = '▶'; }
                    if (prevHeader) prevHeader.classList.remove('active');
                }
            }
            content.classList.add('expanded');
            toggle.classList.remove('collapsed');
            toggle.innerText = '▼';
            headerElem.classList.add('active');
            currentOpenCategory = catId;
        }
    }
    
    function selectChannel(channel, element) {
        if (currentChannelId) {
            const prev = document.getElementById(currentChannelId);
            if (prev) prev.classList.remove('selected');
        }
        currentChannelId = channel.id;
        element.classList.add('selected');
        playChannel(channel);
        if(window.innerWidth <= 768) toggleSidebar();
    }
    
    function playChannel(channel) {
        document.getElementById('current-channel-name').innerText = channel.name;
        currentUrl = channel.url;
        playStream(currentUrl);
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active');
    }
    
    function openIntent(url, packageName) {
        let cleanUrl = url.replace(/^https?:\/\//, '');
        let scheme = url.startsWith('https') ? 'https' : 'http';
        const intentUri = `intent://${cleanUrl}#Intent;scheme=${scheme};package=${packageName};type=video/*;end`;
        window.location.href = intentUri;
    }
    
    async function playStream(url) {
        stopAllPlayers();
        const statusLabel = document.getElementById('player-status');
        statusLabel.style.display = 'block';
        
        if (currentPlayer === 'mx' || currentPlayer === 'wiseplay') {
            statusLabel.innerText = `📲 กำลังเปิด ${currentPlayer === 'mx' ? 'MX Player' : 'Wiseplay'} ...`;
            const pkg = currentPlayer === 'mx' ? 'com.mxtech.videoplayer.ad' : 'com.wiseplay';
            openIntent(url, pkg);
            setTimeout(() => statusLabel.style.display = 'none', 2000);
        } 
        else if (currentPlayer === 'shaka') {
            statusLabel.innerText = "🎬 Shaka Player";
            const vid = document.getElementById('shaka-video');
            vid.style.display = 'block';
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                shakaInstance = new shaka.Player(vid);
                try { await shakaInstance.load(url); vid.play(); } catch(e) { console.error(e); }
            }
        }
        else if (currentPlayer === 'hls') {
            statusLabel.innerText = "🎞️ HLS.js";
            const vid = document.getElementById('hls-video');
            vid.style.display = 'block';
            if (Hls.isSupported()) {
                hlsObj = new Hls();
                hlsObj.loadSource(url);
                hlsObj.attachMedia(vid);
                hlsObj.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                vid.src = url;
                vid.play();
            }
        }
        else if (currentPlayer === 'jw') {
            statusLabel.innerText = "📺 JW Player";
            document.getElementById('jw-player-div').style.display = 'block';
            jwInstance = jwplayer("jw-player-div").setup({
                file: url, type: "hls", width: "100%", height: "100%", autostart: true
            });
        }
        else if (currentPlayer === 'videojs') {
            statusLabel.innerText = "🎥 Video.js";
            const vjsEl = document.getElementById('vjs-video');
            vjsEl.style.display = 'block';
            if (!videoJsPlayer) videoJsPlayer = videojs('vjs-video');
            videoJsPlayer.src({ type: 'application/x-mpegURL', src: url });
            videoJsPlayer.play();
        }
        setTimeout(() => statusLabel.style.display = 'none', 3000);
    }
    
    function stopAllPlayers() {
        if (shakaInstance) { shakaInstance.destroy(); shakaInstance = null; }
        if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
        if (jwInstance) { jwInstance.remove(); jwInstance = null; }
        if (videoJsPlayer) videoJsPlayer.pause();
        document.querySelectorAll('video').forEach(v => { v.pause(); v.style.display = 'none'; });
        document.getElementById('jw-player-div').style.display = 'none';
        document.getElementById('shaka-video').style.display = 'none';
        document.getElementById('hls-video').style.display = 'none';
        document.getElementById('vjs-video').style.display = 'none';
    }
    
    function changePlayer(player, btn) {
        currentPlayer = player;
        document.querySelectorAll('.player-select-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (currentUrl) playStream(currentUrl);
    }
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth > 768) {
            sidebar.classList.toggle('hidden');
        } else {
            sidebar.classList.toggle('active');
        }
    }
    
    // เริ่มต้น: โหลด Playlist โดยใช้ URL ที่ฝังในตัวแปร M3U_PLAYLIST_URL เท่านั้น
    window.onload = () => {
        fetchAndParsePlaylist(false);
        document.getElementById('hardRefreshBtn').addEventListener('click', () => {
            fetchAndParsePlaylist(true);
        });
    };

    // ======================================================================================
    // 📺 ส่วนที่เพิ่มเข้ามาใหม่: ระบบจัดการ Remote Control Navigation (ไม่กระทบโค้ดเดิม)
    // ======================================================================================
    (function() {
        let currentFocusArea = 'sidebar'; // ค่าเริ่มต้นจับโฟกัสที่เมนูด้านซ้าย ('sidebar' หรือ 'main')
        let focusIndex = 0; // ลำดับไอเทมที่เลือกในพื้นที่นั้นๆ

        // สร้างสไตล์ CSS สำหรับแสดงสถานะ Focus ของรีโมท (เพิ่มเข้าไปแบบไดนามิก)
        const style = document.createElement('style');
        style.innerHTML = `
            .category-header:focus, .channel-item:focus, #player-controls button:focus, #top-bar button:focus {
                outline: 3px solid #ffcc00 !important;
                background-color: #444 !important;
                box-shadow: 0 0 15px #ffcc00;
            }
            .channel-item:focus { background-color: #555 !important; }
        `;
        document.head.appendChild(style);

        // ฟังก์ชันรับรายการองค์ประกอบทั้งหมดที่สามารถกดรีโมทเลือกได้ใน Sidebar
        function getSidebarElements() {
            const elements = [];
            const categories = document.querySelectorAll('#channel-list .category');
            categories.forEach(cat => {
                const header = cat.querySelector('.category-header');
                if (header) elements.push(header);
                
                const content = cat.querySelector('.category-content');
                if (content && content.classList.contains('expanded')) {
                    const items = content.querySelectorAll('.channel-item');
                    items.forEach(item => elements.push(item));
                }
            });
            return elements;
        }

        // ฟังก์ชันรับรายการปุ่มทั้งหมดในฝั่งขวา (Main Content)
        function getMainElements() {
            const elements = [];
            // ปุ่มใน Top Bar
            document.querySelectorAll('#top-bar button').forEach(btn => {
                if (window.getComputedStyle(btn).display !== 'none') elements.push(btn);
            });
            // ปุ่มใน Player Controls (MX Player, Wiseplay)
            document.querySelectorAll('#player-controls button').forEach(btn => {
                if (window.getComputedStyle(btn).display !== 'none') elements.push(btn);
            });
            return elements;
        }

        // ฟังก์ชันอัปเดตตำแหน่งและโฟกัสองค์ประกอบจริงตาม Index
        function updateFocus() {
            if (currentFocusArea === 'sidebar') {
                const sidebarElems = getSidebarElements();
                if (sidebarElems.length === 0) return;
                if (focusIndex >= sidebarElems.length) focusIndex = sidebarElems.length - 1;
                if (focusIndex < 0) focusIndex = 0;
                sidebarElems[focusIndex].focus();
                sidebarElems[focusIndex].scrollIntoView({ block: 'nearest' });
            } else {
                const mainElems = getMainElements();
                if (mainElems.length === 0) return;
                if (focusIndex >= mainElems.length) focusIndex = mainElems.length - 1;
                if (focusIndex < 0) focusIndex = 0;
                mainElems[focusIndex].focus();
                mainElems[focusIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        // ดักจับปุ่มกดจากคีย์บอร์ดหรือรีโมทแอนดรอยด์ทีวี (D-Pad)
        window.addEventListener('keydown', function(e) {
            const sidebarElems = getSidebarElements();
            const mainElems = getMainElements();

            switch(e.key) {
                case 'ArrowUp': // ปุ่มขึ้น
                    e.preventDefault();
                    focusIndex--;
                    updateFocus();
                    break;
                    
                case 'ArrowDown': // ปุ่มลง
                    e.preventDefault();
                    focusIndex++;
                    updateFocus();
                    break;
                    
                case 'ArrowLeft': // ปุ่มซ้าย
                    e.preventDefault();
                    if (currentFocusArea === 'main') {
                        // 2.1 หากอยู่พื้นที่สตรีมมิ่ง/ปุ่มขวา แล้วกดซ้ายจนสุด จะข้ามกลับมาเมนูด้านซ้าย
                        if (focusIndex === 0 || focusIndex % 2 === 0) { 
                            currentFocusArea = 'sidebar';
                            focusIndex = 0; // กลับไปเริ่มที่แถวแรกสุดของเมนูด้านซ้าย
                            // หากแถบเมนูถูกซ่อนอยู่ ให้เปิดแสดงขึ้นมาอัตโนมัติ
                            const sidebar = document.getElementById('sidebar');
                            if (sidebar && sidebar.classList.contains('hidden')) toggleSidebar();
                        } else {
                            focusIndex--;
                        }
                    } else {
                        // หากอยู่ฝั่งซ้ายอยู่แล้วให้เลื่อนตำแหน่งขึ้นด้านบน
                        focusIndex = Math.max(0, focusIndex - 1);
                    }
                    updateFocus();
                    break;
                    
                case 'ArrowRight': // ปุ่มขวา
                    e.preventDefault();
                    if (currentFocusArea === 'sidebar') {
                        // 2.2 เมื่ออยู่พื้นที่เมนูด้านซ้าย เมื่อกดปุ่มขวา ให้ข้ามไปทำงานในพื้นที่สตรีมมิ่งขวา
                        currentFocusArea = 'main';
                        focusIndex = 0; // เริ่มโฟกัสที่ปุ่มแรกสุดใน Main content
                    } else {
                        // หากอยู่ฝั่งขวาอยู่แล้ว ให้เลื่อนการเลือกไปด้านขวา
                        focusIndex = Math.min(mainElems.length - 1, focusIndex + 1);
                    }
                    updateFocus();
                    break;
                    
                case 'Enter': // ปุ่มตกลง (OK)
                    // สั่งจำลองการคลิกเมาส์เมื่อกดปุ่ม Enter ของรีโมท
                    if (document.activeElement) {
                        document.activeElement.click();
                        // เคลียร์ค่าหากผู้ใช้กดเลือกช่อง เพื่อให้โฟกัสไม่อลหม่านหลังเปลี่ยนช่อง
                        setTimeout(updateFocus, 100);
                    }
                    break;
            }
        });

        // ให้เริ่มตั้งต้นจับโฟกัสอัตโนมัติหลังจากโหลดรายการ M3U ชุดแรกสำเร็จ
        const checkExist = setInterval(function() {
            if (getSidebarElements().length > 0) {
                updateFocus();
                clearInterval(checkExist);
            }
        }, 500);
    })();
</script>

<script>
    (function() {
        // 1. สร้างสไตล์สำหรับการจัดวางกล่องค้นหาภายใน Sidebar
        const searchStyle = document.createElement('style');
        searchStyle.innerHTML = `
            .search-box-wrapper {
                padding: 10px;
                background-color: #222;
                border-bottom: 1px solid #444;
            }
            .search-input {
                width: 100%;
                padding: 8px 12px;
                background-color: #1a1a1a;
                border: 1px solid #555;
                border-radius: 4px;
                color: white;
                font-size: 0.9em;
                box-sizing: border-box;
                transition: border-color 0.2s;
            }
            .search-input:focus {
                border-color: #ffcc00;
                outline: none;
                box-shadow: 0 0 5px #ffcc00;
            }
            .channel-item.search-hidden {
                display: none !important;
            }
            .category.search-hidden {
                display: none !important;
            }
        `;
        document.head.appendChild(searchStyle);

        // 2. สร้างโครงสร้าง HTML กล่องค้นหาและนำไปแทรกต่อจาก Sidebar Header
        const searchWrapper = document.createElement('div');
        searchWrapper.className = 'search-box-wrapper';
        
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.className = 'search-input';
        searchInput.placeholder = '🔍 พิมพ์เพื่อค้นหาหนัง/ซีรี่ส์...';
        
        searchWrapper.appendChild(searchInput);

        // นำกล่องค้นหาไปแทรกใน Sidebar โดยวางไว้ก่อนหน้าตัว #channel-list
        const sidebar = document.getElementById('sidebar');
        const channelList = document.getElementById('channel-list');
        if (sidebar && channelList) {
            sidebar.insertBefore(searchWrapper, channelList);
        }

        // 3. ฟังก์ชันกรองรายชื่อหนังเมื่อมีการกดพิมพ์ข้อความ (รองรับการทำงานพิมพ์เพียง 1 ตัวอักษร)
        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            const categories = document.querySelectorAll('#channel-list .category');

            categories.forEach(cat => {
                const items = cat.querySelectorAll('.channel-item');
                let matchCount = 0;

                items.forEach(item => {
                    const text = item.querySelector('span').innerText.toLowerCase();
                    
                    // หากตรงกับคำค้นหา (แค่ตัวเดียวก็ทำงานทันที)
                    if (text.includes(query)) {
                        item.classList.remove('search-hidden');
                        matchCount++;
                    } else {
                        item.classList.add('search-hidden');
                    }
                });

                const contentDiv = cat.querySelector('.category-content');
                const toggleSpan = cat.querySelector('.category-toggle');
                const header = cat.querySelector('.category-header');

                // หากมีการค้นหาและพบหนังในหมวดนี้ ให้กางหมวดหมู่ออกมาแสดงรายชื่ออัตโนมัติ
                if (query.length > 0) {
                    if (matchCount > 0) {
                        cat.classList.remove('search-hidden');
                        if (contentDiv) contentDiv.classList.add('expanded');
                        if (toggleSpan) {
                            toggleSpan.classList.remove('collapsed');
                            toggleSpan.innerText = '▼';
                        }
                        if (header) header.classList.add('active');
                    } else {
                        // ถ้าไม่เจออะไรเลยในหมวดนี้ให้ซ่อนหมวดหมู่ไป
                        cat.classList.add('search-hidden');
                    }
                } else {
                    // หากช่องค้นหากลับมาว่างเปล่า ให้คืนค่าแสดงผลตามปกติแบบเดิม
                    cat.classList.remove('search-hidden');
                    // ปิดทุกหมวด ยกเว้นหมวดแรกตามพฤติกรรมโค้ดดั้งเดิม
                    const allCats = Array.from(document.querySelectorAll('#channel-list .category'));
                    const currentIdx = allCats.indexOf(cat);
                    
                    if (currentIdx === 0) {
                        if (contentDiv) contentDiv.classList.add('expanded');
                        if (toggleSpan) { toggleSpan.classList.remove('collapsed'); toggleSpan.innerText = '▼'; }
                        if (header) header.classList.add('active');
                    } else {
                        if (contentDiv) contentDiv.classList.remove('expanded');
                        if (toggleSpan) { toggleSpan.classList.add('collapsed'); toggleSpan.innerText = '▶'; }
                        if (header) header.classList.remove('active');
                    }
                }
            });
        });

        // 4. ผูกช่องค้นหาเข้ากับระบบรีโมท D-pad เดิมเพื่อให้เลื่อนขึ้นมาพิมพ์ข้อความได้สะดวก
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown') {
                // กดปุ่มลงที่ช่องค้นหาจะกระโดดไปโฟกัสที่หมวดหมู่หรือรายการหนังชิ้นแรกทันที
                const firstChannel = document.querySelector('#channel-list .category:not(.search-hidden) .category-header');
                if (firstChannel) {
                    e.preventDefault();
                    firstChannel.focus();
                }
            }
        });
    })();
</script>
</body>
