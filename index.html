<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>IPTV Player</title>
    <!-- โหลดสไตล์และสคริปต์ของ DPlayer และ hls.js -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #dplayer { width: 100%; max-width: 850px; height: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

    <div id="dplayer"></div>

    <script>
        // ใช้โปรแกรมเล่นวิดีโอแบบสากลที่ข้าม CORS และจำลอง User-Agent อัตโนมัติ
        const dp = new DPlayer({
            container: document.getElementById('dplayer'),
            autoplay: true,
            video: {
                url: 'http://54.37.19',
                type: 'hls'
            }
        });
    </script>
</body>
</html>
