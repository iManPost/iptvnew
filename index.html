<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U8 IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

.player{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
}

.current{
    padding:15px 0;
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}

.playlist{
    background:#1c1c1c;
    border-radius:10px;
    overflow:hidden;
}

.item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #333;
}

.item:hover{
    background:#2a2a2a;
}

.item img{
    width:60px;
    height:60px;
    object-fit:contain;
    background:#fff;
    border-radius:6px;
}

.info h4{
    margin:0;
}

.info span{
    color:#aaa;
    font-size:12px;
}
</style>

</head>
<body>

<div class="container">

<div class="player">
<video id="video" controls autoplay playsinline></video>
</div>

<div id="current" class="current">
เลือกช่องเพื่อเริ่มเล่น
</div>

<div id="playlist" class="playlist"></div>

</div>

<script>

const m3uData = `
#EXTINF:-1 tvg-logo="https://ais-s.ais-vidnt.com/ais/play/origin/LIVE/channelicon/LOGO3HD.PNG" group-title="Digital TV",CH3 HD
https://lb-gmmz.sky-cdn.com/gmm/ch3.m3u8

#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://58-64-52-73-rewriter.ais-vidnt.com/ais/play/origin/LIVE//channelicon//ch5new.logo.png",CH5 HD
https://lb-gmmz.sky-cdn.com/gmm/ch5.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://gigatv.3bbtv.co.th/wp-content/themes/changwattana/assets/channel/35.png",CH7 HD
https://lb-gmmz.sky-cdn.com/gmm/ch7.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://gigatv.3bbtv.co.th/wp-content/themes/changwattana/assets/channel/30.png",MCOT HD
https://mcothd-streaming-edge-cdn.mcot.net/tencentmcot/smil:tencentmcot.smil/playlist.m3u8

<div id="groups" class="groups"></div>
#EXTINF:-1 group-title="ช่องข่าว" tvg-logo="https://raw.githubusercontent.com/zaxacaasada/logotv/refs/heads/main/siamthai.png",13สยามไท
https://live.x2.co.th/live/13livetv-th_720p/index.m3u8	
#EXTINF:-1 group-title="ช่องข่าว",Cable 37
http://88.135.69.66:2095/play/live.php?mac=10:27:BE:24:0e:b7&stream=115529&extension=m3u8


#EXTINF:-1 tvg-logo="https://images.pluto.tv/channels/5f7790b3ed0c88000720b241/colorLogoPNG_1731837233662.png" group-title="ช่องสำหรับเด็ก",One Piece (eng sub)
https://jmp2.uk/plu-5f7790b3ed0c88000720b241.m3u8
#EXTINF:-1 tvg-logo="https://images.pluto.tv/channels/5da0c85bd2c9c10009370984/colorLogoPNG.png" group-title="ช่องสำหรับเด็ก",Naruto (eng sub)
https://jmp2.uk/plu-5da0c85bd2c9c10009370984.m3u8`;

const video = document.getElementById("video");
const current = document.getElementById("current");
const playlist = document.getElementById("playlist");

let hls;

function parseM3U(text){

    const lines = text.split("\n");

    const channels = [];

    let name = "";
    let logo = "";
    let group = "";

    for(let i=0;i<lines.length;i++){

        const line = lines[i].trim();

        if(line.startsWith("#EXTINF")){

            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            const groupMatch = line.match(/group-title="([^"]+)"/);

            logo = logoMatch ? logoMatch[1] : "";
            group = groupMatch ? groupMatch[1] : "Other";

            name = line.split(",").pop().trim();

        }
        else if(line.startsWith("http")){

            channels.push({
                name,
                logo,
                group,
                url:line
            });

        }
    }

    return channels;
}

function playChannel(channel){

    current.textContent = "กำลังเล่น: " + channel.name;

    if(hls){
        hls.destroy();
    }

    if(Hls.isSupported()){

        hls = new Hls();

        hls.loadSource(channel.url);

        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED,()=>{
            video.play().catch(()=>{});
        });

        hls.on(Hls.Events.ERROR,(event,data)=>{
            console.error(data);
        });

    }else if(video.canPlayType('application/vnd.apple.mpegurl')){

        video.src = channel.url;

        video.play().catch(()=>{});
    }
}

function renderChannels(){

    const channels = parseM3U(m3uData);

    channels.forEach(channel=>{

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/60'">
            <div class="info">
                <h4>${channel.name}</h4>
                <span>${channel.group}</span>
            </div>
        `;

        div.onclick = ()=>playChannel(channel);

        playlist.appendChild(div);

    });

    if(channels.length){
        playChannel(channels[0]);
    }
}

renderChannels();

</script>

</body>
</html>
