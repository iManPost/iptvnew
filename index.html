const video = document.getElementById("video");
const current = document.getElementById("current");
const playlist = document.getElementById("playlist");

/* สร้างกล่องหมวดหมู่ด้านบนอัตโนมัติ */
const groupsDiv = document.createElement("div");
groupsDiv.id = "groups";
groupsDiv.className = "groups";
playlist.parentNode.insertBefore(groupsDiv, playlist);

let hls;

function parseM3U(text){

    const lines = text.split("\n");
    const channels = [];

    let name = "";
    let logo = "";
    let group = "";

    for(let i=0;i<lines.length;i++){

        const line = lines[i].trim();

        if(line.startsWith("#EXTINF")){

            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            const groupMatch = line.match(/group-title="([^"]+)"/);

            logo = logoMatch ? logoMatch[1] : "";
            group = groupMatch ? groupMatch[1] : "อื่นๆ";

            name = line.split(",").pop().trim();
        }
        else if(line.startsWith("http")){

            channels.push({
                name,
                logo,
                group,
                url: line
            });
        }
    }

    return channels;
}

function playChannel(channel){

    current.textContent = "กำลังเล่น: " + channel.name;

    if(hls){
        hls.destroy();
    }

    if(Hls.isSupported()){

        hls = new Hls();

        hls.loadSource(channel.url);

        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED,()=>{
            video.play().catch(()=>{});
        });

    }else if(video.canPlayType('application/vnd.apple.mpegurl')){

        video.src = channel.url;
        video.play().catch(()=>{});
    }
}

function renderPlaylist(channels){

    playlist.innerHTML = "";

    channels.forEach(channel=>{

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <img src="${channel.logo}"
                 onerror="this.src='https://via.placeholder.com/60'">

            <div class="info">
                <h4>${channel.name}</h4>
                <span>${channel.group}</span>
            </div>
        `;

        div.onclick = () => playChannel(channel);

        playlist.appendChild(div);
    });
}

function renderChannels(){

    const channels = parseM3U(m3uData);

    const groups = [...new Set(
        channels.map(ch => ch.group)
    )];

    groupsDiv.innerHTML = "";

    groups.forEach((group,index)=>{

        const btn = document.createElement("button");

        btn.className = "group-btn";
        btn.textContent = group;

        if(index === 0){
            btn.classList.add("active");
        }

        btn.addEventListener("click",()=>{

            document
            .querySelectorAll(".group-btn")
            .forEach(b=>b.classList.remove("active"));

            btn.classList.add("active");

            const filtered =
                channels.filter(ch=>ch.group===group);

            renderPlaylist(filtered);
        });

        groupsDiv.appendChild(btn);
    });

    if(groups.length){

        const firstGroup = groups[0];

        const firstChannels =
            channels.filter(ch=>ch.group===firstGroup);

        renderPlaylist(firstChannels);

        if(firstChannels.length){
            playChannel(firstChannels[0]);
        }
    }
}

renderChannels();
