<script>

// ==========================================
// PLAYLIST DATA (รองรับ .m3u8, .mpd และ DRM)
// ==========================================

const m3uData = `
#EXTINF:-1 group-title="ช่องดิจิตอล" tvg-logo="https://ais-vidnt.com",CH3 HD
https://sky-cdn.com

#EXTINF:-1 group-title="ช่องดิจิตอล" tvg-logo="https://ais-vidnt.com",CH5 HD
https://sky-cdn.com

#EXTINF:-1 group-title="🎞️ หนังภาพยนตร์" tvg-logo="https://jtvnw.net",RED BULL TV
https://akamaized.net

#EXTINF:-1 group-title="Newsข่าว" tvg-logo="https://imgur.com",Top News
https://topnews.co.th

#EXTINF:-1 group-title="สารคดี" tvg-logo="https://placeholder.com",Fishing Tv
https://frequency.stream

#EXTINF:-1 group-title="🔒 ช่อง DRM" tvg-logo="https://placeholder.com" kid="ใส่ค่า KeyID ของคุณตรงนี้" key="ใส่ค่า Key ของคุณตรงนี้",ตัวอย่างช่อง MPD DRM (ClearKey)
http://ตัวอย่างลิงก์สตรีมมิ่ง/manifest.mpd
`;

// ==========================================

const playlist=document.getElementById("playlist");
const playlistWrapper=document.getElementById("playlistWrapper");
const current=document.getElementById("current");
const fallbackVideo=document.getElementById("fallbackVideo");
const groupsContainer=document.getElementById("groups");

let channels=[];
let displayedChannels=[]; // เก็บรายการช่องที่สะท้อนอยู่บนหน้าจอจริง
let jw=null;
let hls=null;
let dashPlayer=null; // เครื่องเล่นสำหรับ MPD (DASH)
let currentChannel=null;

// ระบบควบคุมตำแหน่งโฟกัสของรีโมท Android TV
let focusArea = "playlist"; // สลับระหว่าง "groups" และ "playlist"
let activeGroupIndex = 0;
let activeChannelIndex = 0;

// ==========================================
// PARSE M3U (คัดกรองลิงก์และตรวจจับข้อมูล DRM)
// ==========================================

function parseM3U(text){
    const lines=text.split("\n");
    const result=[];
    
    let name="";
    let logo="";
    let group="อื่นๆ";
    let drm=false;
    let keyId="";
    let key="";

    for(const line of lines){
        const l=line.trim();
        if(!l) continue;

        if(l.startsWith("#EXTINF")){
            const g=l.match(/group-title="([^"]+)"/);
            const lg=l.match(/tvg-logo="([^"]+)"/);
            
            // อ่านค่ารหัสปลดล็อก DRM ClearKey (kid / key) จากแท็กบรรทัด M3U
            const kidMatch=l.match(/kid="([^"]+)"/);
            const keyMatch=l.match(/key="([^"]+)"/);

            group=g ? g[1] : "อื่นๆ";
            logo=lg ? lg[1] : "";
            keyId=kidMatch ? kidMatch[1] : "";
            key=keyMatch ? keyMatch[1] : "";
            drm=(keyId !== "" && key !== "");

            name=l.split(",").pop().trim();
        }
        else if(l.startsWith("http")){
            // ถ้าชื่อไฟล์ลงท้ายด้วย .mpd แต่ไม่มีการระบุคีย์ ให้เปิดระบบรองรับวิดีโอรูปแบบ MPD รอไว้ก่อน
            if(l.toLowerCase().includes(".mpd") && !keyId) {
                drm = true; 
            }

            result.push({
                name: name || "Unknown Channel",
                logo,
                group,
                url:l,
                drm,
                keyId,
                key
            });
            
            // ล้างค่าตัวแปรเพื่อวนลูปอ่านช่องถัดไป
            name=""; logo=""; drm=false; keyId=""; key="";
        }
    }
    return result;
}

// ==========================================
// RESET ALL PLAYERS (เคลียร์เครื่องเล่นเดิมทิ้ง)
// ==========================================

function resetPlayers() {
    if(jw) { try{ jw.stop(); }catch(e){} }
    if(hls){ hls.destroy(); hls=null; }
    if(dashPlayer){ dashPlayer.destroy(); dashPlayer=null; }
    
    fallbackVideo.pause();
    fallbackVideo.removeAttribute("src");
    fallbackVideo.load();
}

// ==========================================
// PLAY CHANNEL FUNCTION (รองรับ MPD/DRM/HLS/JW)
// ==========================================

function playChannel(channel){
    currentChannel=channel;
    localStorage.setItem("lastChannel", JSON.stringify(channel));
    current.textContent="กำลังเล่น : "+channel.name;

    // เปลี่ยนสีไฮไลต์ในรายการช่องให้รู้ว่าเล่นช่องนี้อยู่
    document.querySelectorAll(".item").forEach(el=>el.classList.remove("active-channel"));
    const active=document.querySelector(`[data-url="${channel.url}"]`);
    if(active) active.classList.add("active-channel");

    // ล้างและหยุดเครื่องเล่นทั้งหมดก่อนเริ่มโหลดช่องใหม่
    resetPlayers();

    const url=channel.url.toLowerCase();

    // 1. ตรวจสอบเงื่อนไขว่าเป็นไฟล์วิดีโอตระกูล MPD หรือมีรหัสป้องกัน DRM
    if(url.includes(".mpd") || channel.drm){
        document.getElementById("player").style.display="none";
        fallbackVideo.style.display="block";

        dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(fallbackVideo, channel.url, true);

        // หากช่องนี้มีค่ารหัส ClearKey ให้ทำการ Inject คีย์เพื่อปลดล็อกไฟล์วิดีโอทันที
        if(channel.keyId && channel.key) {
            const protectionData = {
                "org.w3.clearkey": {
                    "clearkeys": {
                        [channel.keyId]: channel.key
                    }
                }
            };
            dashPlayer.setProtectionData(protectionData);
        }
    }
    // 2. หากเป็นไฟล์สตรีมมิ่งประเภท HLS (.m3u8) ให้ใช้ hls.js รันผ่าน Native HTML5 Video
    else if(url.includes(".m3u8")){
        document.getElementById("player").style.display="none";
        fallbackVideo.style.display="block";

        if(Hls.isSupported()){
            hls=new Hls({ enableWorker:true, lowLatencyMode:true });
            hls.loadSource(channel.url);
            hls.attachMedia(fallbackVideo);
            hls.on(Hls.Ev}
fallbackVideo.play().catch(()=>{});});}else if(fallbackVideo.canPlayType("application/vnd.apple.mpegurl")){fallbackVideo.src=channel.url;fallbackVideo.play().catch(()=>{});}}// 3. ลิงก์สตรีมแบบอื่นๆ นอกเหนือจากด้านบน จะให้เปิดใช้งานผ่านตัวเล่นหลัก JW Playerelse {document.getElementById("player").style.display="block";fallbackVideo.style.display="none";try{if(!jw){jw=jwplayer("player").setup({file:channel.url,width:"100%",aspectratio:"16:9",autostart:true});}else{jw.load([{ file:channel.url }]);jw.play(true);}}catch(e){console.log("JW Player Error:", e);}}}// ==========================================// RENDER LIST & GROUPS UI// ==========================================function renderList(list){playlist.innerHTML="";displayedChannels = list; // ซิงก์ข้อมูลช่องที่แสดงผลอยู่ ณ ปัจจุบันให้ระบบรีโมทรับรู้list.forEach((ch, idx)=>{const div=document.createElement("div");div.className="item";div.tabIndex = "-1"; // เปิดสถานะให้ Element สามารถถูกแทรกโฟกัสผ่านโค้ดได้div.dataset.url=ch.url;div.dataset.index = idx;if(currentChannel && currentChannel.url === ch.url){div.className += " active-channel";activeChannelIndex = idx; // จำตำแหน่งช่องปัจจุบันเอาไว้เมื่อกดย้ายหมวดหมู่}div.innerHTML=<img src="${ch.logo}" onerror="this.src='https://placeholder.com'"> <div> <div style="font-weight:bold;">${ch.name}</div> <div style="font-size:12px; color:#aaa; margin-top:4px;">${ch.group}</div> </div>;// คลิกรวมทั้งการกดเลือกจากเมาส์และนิ้วสัมผัสdiv.addEventListener("click", () => {activeChannelIndex = idx;focusArea = "playlist";updateTVFocus();playChannel(ch);});playlist.appendChild(div);});}function renderGroups(){groupsContainer.innerHTML = "";// คัดกรองรายชื่อหมวดหมู่จากลิสต์ทั้งหมดตัดชื่อซ้ำออกconst categories = ["ทั้งหมด", ...new Set(channels.map(ch => ch.group))];categories.forEach((cat, index) => {const btn = document.createElement("button");btn.className = "group-btn" + (index === 0 ? " active" : "");btn.textContent = cat;btn.dataset.index = index;btn.addEventListener("click", () => {activeGroupIndex = index;focusArea = "groups";updateTVFocus();switchGroup(cat, btn);});groupsContainer.appendChild(btn);});}function switchGroup(cat, btnElement) {document.querySelectorAll(".group-btn").forEach(b => b.classList.remove("active"));btnElement.classList.add("active");if(cat === "ทั้งหมด"){renderList(channels);} else {const filtered = channels.filter(ch => ch.group === cat);renderList(filtered);}activeChannelIndex = 0; // รีเซ็ตโฟกัสชี้ช่องไปที่ช่องแรกสุดของหมวดหมู่นั้นๆ ทันที}// ==========================================// ANDROID TV REMOTE D-PAD CONTROL SYSTEM// ==========================================function updateTVFocus() {// เคลียร์คลาสเอฟเฟกต์โฟกัสเดิมออกให้หมดก่อนdocument.querySelectorAll(".tv-focus").forEach(el => el.classList.remove("tv-focus"));if (focusArea === "groups") {const groupButtons = document.querySelectorAll(".group-btn");if(groupButtons[activeGroupIndex]) {groupButtons[activeGroupIndex].classList.add("tv-focus");// สั่งสกรอลหน้าจอแถวแนวนอนเลื่อนหาปุ่มที่ถูกโฟกัสอัตโนมัติgroupButtons[activeGroupIndex].scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });}} else if (focusArea === "playlist") {const channelItems = document.querySelectorAll(".item");if(channelItems[activeChannelIndex]) {channelItems[activeChannelIndex].classList.add("tv-focus");// สั่งสกรอลรายการแนวตั้งให้เลื่อนเลื่อนตามช่องที่รีโมทกดไปถึงอัตโนมัติchannelItems[activeChannelIndex].scrollIntoView({ behavior: "smooth", block: "nearest" });}}}// ดักจับค่าคีย์เวิร์ดปุ่มกดจากรีโมทคอนโทรลทีวีwindow.addEventListener("keydown", (e) => {const groupButtons = document.querySelectorAll(".group-btn");const channelItems = document.querySelectorAll(".item");switch (e.keyCode) {case 37: // ปุ่มรีโมท : กดซ้ายif (focusArea === "groups") {if (activeGroupIndex > 0) activeGroupIndex--;} else {// หากกำลังเลือกแถวช่องรายการด้านล่างแล้วกดซ้าย ให้เด้งสลับโฟกัสไปเลือกแถวหมวดหมู่ด้านบนแทนfocusArea = "groups";}updateTVFocus();e.preventDefault();break;case 39: // ปุ่มรีโมท : กดขวาif (focusArea === "groups") {if (activeGroupIndex < groupButtons.length - 1) activeGroupIndex++;}updateTVFocus();e.preventDefault();break;case 38: // ปุ่มรีโมท : กดขึ้นif (focusArea === "playlist") {if (activeChannelIndex > 0) {activeChannelIndex--;} else {// หากอยู่ที่หัวแถวของช่องแล้วกดขึ้นอีกครั้ง โฟกัสจะขยับขึ้นไปที่ปุ่มหมวดหมู่ด้านบนfocusArea = "groups";}}updateTVFocus();e.preventDefault();break;case 40: // ปุ่มรีโมท : กดลงif (focusArea === "groups") {// อยู่หมวดหมู่ด้านบนเมื่อกดลง จะย้ายมาที่แถวรายชื่อช่องรายการif(channelItems.length > 0) {focusArea = "playlist";}} else if (focusArea === "playlist") {if (activeChannelIndex < channelItems.length - 1) activeChannelIndex++;}updateTVFocus();e.preventDefault();break;case 13: // ปุ่มรีโมท : ตกลง (OK / Enter / D-Pad Center)if (focusArea === "groups") {if(groupButtons[activeGroupIndex]) groupButtons[activeGroupIndex].click();} else if (focusArea === "playlist") {if(displayedChannels[activeChannelIndex]) {playChannel(displayedChannels[activeChannelIndex]);}}e.preventDefault();break;case 8: // ปุ่มรีโมท : ย้อนกลับ (Back)if(focusArea === "playlist") {// กดแบ็กเพื่อกระโดดโฟกัสกลับขึ้นไปเริ่มเลือกที่กลุ่มหมวดหมู่ด้านบนfocusArea = "groups";updateTVFocus();e.preventDefault();}break;}// ฟังก์ชันเสริม: กดตัวเลข 0-9 บนคีย์บอร์ดหรือรีโมททีวีเพื่อสลับช่องตามลำดับได้ทันทีif (e.keyCode >= 48 && e.keyCode <= 57) {const num = e.keyCode - 48;const targetIndex = num === 0 ? 9 : num - 1; // กดปุ่มเลข 1 สลับเล่นช่องลำดับแรกสุด, เลข 0 คือลำดับที่ 10if(displayedChannels[targetIndex]) {activeChannelIndex = targetIndex;focusArea = "playlist";updateTVFocus();playChannel(displayedChannels[targetIndex]);}}});// ==========================================// SYSTEM INITIALIZATION (รันระบบเมื่อหน้าเว็บโหลดเสร็จ)// ==========================================window.addEventListener("DOMContentLoaded", () => {// แกะและวิเคราะห์ข้อมูลไฟล์ M3Uchannels = parseM3U(m3uData);// เรนเดอร์สร้าง UI หมวดหมู่และช่องสัญญาณrenderGroups();renderList(channels);// ตรวจสอบและเล่นช่องล่าสุดที่ผู้ใช้เปิดค้างไว้ล่าสุด (Auto-Resume)const savedChannel = localStorage.getItem("lastChannel");if(savedChannel){try {const parsed = JSON.parse(savedChannel);const matchIndex = displayedChannels.findIndex(ch => ch.url === parsed.url);if(matchIndex !== -1) activeChannelIndex = matchIndex;playChannel(parsed);} catch(e) {localStorage.removeItem("lastChannel");current.textContent = "เลือกช่องเพื่อเริ่มเล่น (ใช้รีโมท ขึ้น/ลง/ซ้าย/ขวา และตกลง)";}} else {current.textContent = "เลือกช่องเพื่อเริ่มเล่น (ใช้รีโมท ขึ้น/ลง/ซ้าย/ขวา และตกลง)";}// ตั้งค่าให้ระบบจับโฟกัสไปที่กลุ่มช่องตั้งแต่เริ่มเปิดโปรแกรมขึ้นมาsetTimeout(updateTVFocus, 500);});
</script>
