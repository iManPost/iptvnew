<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 Web Player Pro</title>
    <!-- โหลดสไตล์และสคริปต์ของ Video.js สำหรับเล่นสตรีมโดยเฉพาะ -->
    <link href="https://zencdn.net" rel="stylesheet" />
    <script src="https://zencdn.net"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            background: #000;
        }
        /* บังคับให้ Video.js แสดงผลเต็มกรอบครอบคลุม 16:9 */
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        .now-playing {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ff66;
            text-align: center;
        }
        .channel-list {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .channel-item:hover {
            background-color: #2a2a2a;
        }
        .channel-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-right: 15px;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
        }
        .channel-info h4 {
            margin: 0 0 5px 0;
            font-size: 0.95rem;
        }
        .channel-info span {
            font-size: 0.75rem;
            color: #bbb;
            background: #3a3a3a;
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ส่วนเครื่องเล่นวิดีโอ (Video.js Element) -->
    <div class="player-container">
        <video id="my-video" class="video-js vjs-default-skin" controls preload="auto" width="640" height="360" data-setup='{}'>
            <p class="vjs-no-js">กรุณาเปิดใช้งาน JavaScript เพื่อรับชมวิดีโอ</p>
        </video>
    </div>
    <div class="now-playing" id="current-title">กำลังโหลดรายการช่อง...</div>

    <!-- รายการช่องโทรทัศน์ -->
    <div class="channel-list" id="playlist"></div>
</div>

<script>
    // ไฟล์ข้อความรวมลิงก์ M3U ทั้งทีวีดิจิตอลและลิงก์ที่มี User-Agent ของคุณ
    const m3uRawData = `#EXTINF:-1 group-title="ช่องดิจิตอล" tvg-logo="https://ais-vidnt.com",CH3 HD
https://media.vdohls.com/a_x-X11cJ4GGW/playlist.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://ais-s.ais-vidnt.com/ais/play/origin/LIVE//channelicon/LOGO3HD.PNG",CH3 HD
https://lb-gmmz.sky-cdn.com/gmm/ch3.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://58-64-52-73-rewriter.ais-vidnt.com/ais/play/origin/LIVE//channelicon//ch5new.logo.png",CH5 HD
https://lb-gmmz.sky-cdn.com/gmm/ch5.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://gigatv.3bbtv.co.th/wp-content/themes/changwattana/assets/channel/35.png",CH7 HD
https://lb-gmmz.sky-cdn.com/gmm/ch7.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://gigatv.3bbtv.co.th/wp-content/themes/changwattana/assets/channel/30.png",MCOT HD
https://mcothd-streaming-edge-cdn.mcot.net/tencentmcot/smil:tencentmcot.smil/playlist.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://ais-s.ais-vidnt.com/ais/play/origin/LIVE//channelicon/0001.png",NBT HD
https://cdn-edge.iiptvcdn.com/live_event/smil:f180-054a-38d7-ce66-f7cf.smil/playlist.m3u8
#EXTINF:-1 tvg-id="" tvg-logo="https://pinimg.com" group-title="🌐Streaming",MOVIE Sony
#EXTVLCOPT:http-user-agent=แชร์เลย
https://player3.fastfastcdn.com/ttplaylist_b00f5b3b4e5f8ed98dd9a7a627f3cdc7720.m3u8`;

    const titleElement = document.getElementById('current-title');
    let player = videojs('my-video'); // เรียกใช้งานโครงสร้างของ Video.js

    // ฟังก์ชันจัดการดึงข้อมูลจากข้อความ M3U
    function parseM3U(data) {
        const lines = data.split('\n').map(line => line.trim());
        const channels = [];
        let currentLogo = "", currentGroup = "", currentName = "", currentUserAgent = "";

        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                currentLogo = logoMatch ? logoMatch[1] : "";
                const groupMatch = line.match(/group-title="([^"]*)"/);
                currentGroup = groupMatch ? groupMatch[1] : "Streaming";
                currentName = line.substring(line.lastIndexOf(',') + 1).trim();
            } else if (line.startsWith('#EXTVLCOPT:http-user-agent=')) {
                currentUserAgent = line.replace('#EXTVLCOPT:http-user-agent=', '').trim();
            } else if (line.startsWith('http')) {
                channels.push({
                    name: currentName,
                    logo: currentLogo,
                    group: currentGroup,
                    userAgent: currentUserAgent,
                    url: line
                });
                currentUserAgent = "";
            }
        });
        return channels;
    }

    // ฟังก์ชันสั่งเปลี่ยนช่องและเล่นสตรีม
    function playStream(channel) {
        titleElement.innerText = "กำลังเล่น: " + channel.name;

        // ตรวจสอบประเภทไฟล์ (.mpd หรือ .m3u8) เพื่อเลือกตัวถอดรหัสที่ถูกต้อง
        let streamType = 'application/x-mpegURL'; // ค่าเริ่มต้นสำหรับ .m3u8 (HLS)
        if (channel.url.includes('.mpd')) {
            streamType = 'application/dash+xml'; // สำหรับ .mpd (DASH)
        }

        // อัปเดตและสั่งเล่นไฟล์ผ่านโครงสร้างภายในของ Video.js โดยตรง
        player.src({
            src: channel.url,
            type: streamType
        });
        
        player.ready(function() {
            player.muted(true); // ปิดเสียงเริ่มต้นเพื่อหลีกเลี่ยงการโดนเบราว์เซอร์บล็อกการเล่นอัตโนมัติ (Autoplay)
            player.play().catch(function(error) {
                console.log("การเล่นอัตโนมัติถูกระงับ ต้องให้ผู้ใช้คลิกบนหน้าจอก่อนหนึ่งครั้ง");
            });
        });
    }

    // ฟังก์ชันวาดเมนูรายการช่องบนจอ
    function initPlayer() {
        const channels = parseM3U(m3uRawData);
        const playlistContainer = document.getElementById('playlist');
        
        if(channels.length === 0) {
            titleElement.innerText = "ไม่พบรายชื่อช่องสัญญาณ";
            return;
        }

        channels.forEach(channel => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.onclick = () => playStream(channel);

            item.innerHTML = `
                <img class="channel-logo" src="${channel.logo || 'https://placeholder.com'}" onerror="this.src='https://placeholder.com'" alt="logo">
                <div class="channel-info">
                    <h4>${channel.name}</h4>
                    <span>${channel.group}</span>
                </div>
            `;
            playlistContainer.appendChild(item);
        });

        // สั่งเปิดเล่นช่องแรกทันทีเมื่อระบบพร้อมทำงาน
        playStream(channels[0]);
    }

    // ทำงานทันทีเมื่อโหลดหน้าต่างเว็บเพจเสร็จสิ้น
    window.onload = initPlayer;
</script>

</body>
</html>
