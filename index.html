<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 / MPD Web Player (Fixed Version)</title>
    <!-- โหลดสคริปต์สตรีมมิ่งเวอร์ชันเสถียร -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .player-container {
            background: #000;
            width: 100%;
            aspect-ratio: 16/9;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        video {
            width: 100%;
            height: 100%;
        }
        .now-playing {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ff66;
            text-align: center;
        }
        .channel-list {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .channel-item:hover {
            background-color: #2a2a2a;
        }
        .channel-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-right: 15px;
            border-radius: 6px;
            background: #000;
        }
        .channel-info h4 {
            margin: 0 0 5px 0;
            font-size: 0.95rem;
        }
        .channel-info span {
            font-size: 0.75rem;
            color: #bbb;
            background: #3a3a3a;
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ส่วนเครื่องเล่นวิดีโอ -->
    <div class="player-container">
        <video id="video" controls autoplay playsinline></video>
    </div>
    <div class="now-playing" id="current-title">กำลังโหลดรายการช่อง...</div>

    <!-- รายการช่องโทรทัศน์ -->
    <div class="channel-list" id="playlist"></div>
</div>

<script>
    // ข้อมูลดิบ M3U ตามโจทย์ของผู้ใช้
    const m3uRawData = `#EXTINF:-1 tvg-id="" tvg-logo="https://pinimg.com" group-title="🌐Streaming",MOVIE Sony
#EXTVLCOPT:http-user-agent=แชร์เลย
http://54.37.19.157/tsp1/tracks-v1a1/mono.m3u8

#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://ais-s.ais-vidnt.com/ais/play/origin/LIVE//channelicon/LOGO3HD.PNG",CH3 HD
https://lb-gmmz.sky-cdn.com/gmm/ch3.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://58-64-52-73-rewriter.ais-vidnt.com/ais/play/origin/LIVE//channelicon//ch5new.logo.png",CH5 HD
https://lb-gmmz.sky-cdn.com/gmm/ch5.m3u8
#EXTINF:-1 group-title="️ช่องดิจิตอล" tvg-logo="https://gigatv.3bbtv.co.th/wp-content/themes/changwattana/assets/channel/35.png",CH7 HD
https://lb-gmmz.sky-cdn.com/gmm/ch7.m3u8

#EXTINF:-1 tvg-chno="2"  tvg-id="BoxCinema" tvg-name="BoxCinema" group-title="🌐Streaming" tvg-logo="https://imgur.com",BoxCinema 1080p
#EXTVLCOPT:http-user-agent=Mozilla/5.0 (Linux; arm_64; Android 9; MI 8) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/79.0.3945.117 YaBrowser/20.2.1.120.00 Yptp/1.32 Mobile Safari/537.36
http://54.37.19.157/bein2/tracks-v1a1/mono.m3u8`;

    const videoElement = document.getElementById('video');
    const titleElement = document.getElementById('current-title');
    let hlsPlayer = null;
    let dashPlayer = null;

    // ระบบจัดรูปแบบดึงข้อมูลข้อความดิบ M3U
    function parseM3U(data) {
        const lines = data.split('\n').map(line => line.trim());
        const channels = [];
        let currentLogo = "", currentGroup = "", currentName = "", currentUserAgent = "";

        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                currentLogo = logoMatch ? logoMatch[1] : "";
                const groupMatch = line.match(/group-title="([^"]*)"/);
                currentGroup = groupMatch ? groupMatch[1] : "Streaming";
                currentName = line.substring(line.lastIndexOf(',') + 1).trim();
            } else if (line.startsWith('#EXTVLCOPT:http-user-agent=')) {
                currentUserAgent = line.replace('#EXTVLCOPT:http-user-agent=', '').trim();
            } else if (line.startsWith('http')) {
                channels.push({
                    name: currentName,
                    logo: currentLogo,
                    group: currentGroup,
                    userAgent: currentUserAgent,
                    url: line
                });
                currentUserAgent = ""; // รีเซ็ตเพื่อรอรับช่องใหม่
            }
        });
        return channels;
    }

    // ฟังก์ชันประมวลผลลิงก์และสั่งเล่นสตรีม
    function playStream(channel) {
        titleElement.innerText = "กำลังเล่น: " + channel.name;

        // ล้างหน่วยความจำเครื่องเล่นเก่าออกให้หมดก่อนเล่นช่องใหม่
        if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        if (dashPlayer) { dashPlayer.destroy(); dashPlayer = null; }
        videoElement.src = "";

        // ปรับแต่งลิงก์วิดีโอผ่าน CORS Proxy สาธารณะเพื่อแก้ไขปัญหาการบล็อกจากเซิร์ฟเวอร์ต้นทาง
        // และแนบข้อมูล User-Agent พิเศษเข้าไปใน Header ผ่าน Proxy
        let finalUrl = channel.url;
        if (channel.userAgent) {
            finalUrl = "https://allorigins.win" + encodeURIComponent(channel.url);
        } else {
            finalUrl = "https://allorigins.win" + encodeURIComponent(channel.url);
        }

        // เล่นไฟล์รูปแบบ .mpd (DASH)
        if (channel.url.includes('.mpd')) {
            dashPlayer = dashjs.MediaPlayer().create();
            dashPlayer.initialize(videoElement, finalUrl, true);
        } 
        // เล่นไฟล์รูปแบบ .m3u8 / .ts (HLS)
        else {
            if (Hls.isSupported()) {
                // กำหนดโครงสร้างตัวโหลดพิเศษเพื่อ bypass ข้อจำกัด http header
                hlsPlayer = new Hls({
                    maxXhrRetryTimeout: 5000,
                    xhrSetup: function (xhr, url) {
                        // ปลดเงื่อนไขเพื่อส่งข้อมูลผ่าน proxy ได้อย่างราบรื่น
                        if(channel.userAgent) {
                            xhr.setRequestHeader("X-Requested-With", "XMLHttpRequest");
                        }
                    }
                });
                hlsPlayer.loadSource(finalUrl);
                hlsPlayer.attachMedia(videoElement);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoElement.play().catch(e => console.log("Auto-play blocked by browser, user interaction required."));
                });
                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.log("พบข้อผิดพลาดของระบบโครงสร้างไฟล์ กำลังพยายามแก้ไขใหม่...");
                        hlsPlayer.recoverMediaError();
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                // รองรับสำหรับเบราว์เซอร์ Safari บนระบบ iOS / macOS
                videoElement.src = finalUrl;
                videoElement.play();
            } else {
                alert("อุปกรณ์หรือเว็บเบราว์เซอร์ของคุณไม่รองรับเทคโนโลยีเครื่องเล่นสตรีมมิ่งชิ้นนี้");
            }
        }
    }

    // ฟังก์ชันสร้าง UI แสดงผลรายการช่อง
    function initPlayer() {
        const channels = parseM3U(m3uRawData);
        const playlistContainer = document.getElementById('playlist');
        
        if(channels.length === 0) {
            titleElement.innerText = "ไม่พบรายชื่อช่องสัญญาณในไฟล์ M3U";
            return;
        }

        channels.forEach(channel => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.onclick = () => playStream(channel);

            item.innerHTML = `
                <img class="channel-logo" src="${channel.logo || 'https://placeholder.com'}" onerror="this.src='https://placeholder.com'" alt="logo">
                <div class="channel-info">
                    <h4>${channel.name}</h4>
                    <span>${channel.group}</span>
                </div>
            `;
            playlistContainer.appendChild(item);
        });

        // สั่งให้เล่นช่องแรกอัตโนมัติเมื่อผู้ใช้งานเปิดหน้าเว็บขึ้นมา
        playStream(channels[0]);
    }

    // เริ่มทำงานทันทีเมื่อหน้าเพจโหลดองค์ประกอบเสร็จสิ้น
    window.onload = initPlayer;
</script>

</body>
</html>
