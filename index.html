<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

.player{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
}

.current{
    padding:15px 0;
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}

.playlist{
    background:#1c1c1c;
    border-radius:10px;
    overflow:hidden;
}

.item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #333;
}

.item:hover{
    background:#2a2a2a;
}

.item img{
    width:60px;
    height:60px;
    object-fit:contain;
    background:#fff;
    border-radius:6px;
}

.info h4{
    margin:0;
}

.info span{
    color:#aaa;
    font-size:12px;
}
 .groups{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin:15px 0;
    padding-bottom:10px;
}

.groups::-webkit-scrollbar{
    height:6px;
}

.group-btn{
    border:none;
    padding:10px 16px;
    border-radius:20px;
    background:#222;
    color:#fff;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
}

.group-btn.active{
    background:#00ff88;
    color:#000;
    font-weight:bold;
}   
</style>

</head>

const video = document.getElementById("video");
const current = document.getElementById("current");
const playlist = document.getElementById("playlist");

/* สร้างกล่องหมวดหมู่ด้านบนอัตโนมัติ */
const groupsDiv = document.createElement("div");
groupsDiv.id = "groups";
groupsDiv.className = "groups";
playlist.parentNode.insertBefore(groupsDiv, playlist);

let hls;

function parseM3U(text){

    const lines = text.split("\n");
    const channels = [];

    let name = "";
    let logo = "";
    let group = "";

    for(let i=0;i<lines.length;i++){

        const line = lines[i].trim();

        if(line.startsWith("#EXTINF")){

            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            const groupMatch = line.match(/group-title="([^"]+)"/);

            logo = logoMatch ? logoMatch[1] : "";
            group = groupMatch ? groupMatch[1] : "อื่นๆ";

            name = line.split(",").pop().trim();
        }
        else if(line.startsWith("http")){

            channels.push({
                name,
                logo,
                group,
                url: line
            });
        }
    }

    return channels;
}

function playChannel(channel){

    current.textContent = "กำลังเล่น: " + channel.name;

    if(hls){
        hls.destroy();
    }

    if(Hls.isSupported()){

        hls = new Hls();

        hls.loadSource(channel.url);

        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED,()=>{
            video.play().catch(()=>{});
        });

    }else if(video.canPlayType('application/vnd.apple.mpegurl')){

        video.src = channel.url;
        video.play().catch(()=>{});
    }
}

function renderPlaylist(channels){

    playlist.innerHTML = "";

    channels.forEach(channel=>{

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <img src="${channel.logo}"
                 onerror="this.src='https://via.placeholder.com/60'">

            <div class="info">
                <h4>${channel.name}</h4>
                <span>${channel.group}</span>
            </div>
        `;

        div.onclick = () => playChannel(channel);

        playlist.appendChild(div);
    });
}

    )];

    groupsDiv.innerHTML = "";

    groups.forEach((group,index)=>{

        const btn = document.createElement("button");

        btn.className = "group-btn";
        btn.textContent = group;

        if(index === 0){
            btn.classList.add("active");
        }

        btn.addEventListener("click",()=>{

            document
            .querySelectorAll(".group-btn")
            .forEach(b=>b.classList.remove("active"));

            btn.classList.add("active");

            const filtered =
                channels.filter(ch=>ch.group===group);

            renderPlaylist(filtered);
        });

        groupsDiv.appendChild(btn);
    });

    if(groups.length){

        const firstGroup = groups[0];

        const firstChannels =
            channels.filter(ch=>ch.group===firstGroup);

        renderPlaylist(firstChannels);

        if(firstChannels.length){
            playChannel(firstChannels[0]);
        }
    }
}

renderChannels();

</script>
