const playlist=document.getElementById("playlist");

const fallbackVideo=document.getElementById("fallbackVideo");

let channels=[];

let hls=null;
let currentChannel=null;

// =========================
// PARSE M3U
// =========================

function parseM3U(text){

    const lines=text.split("\n");
    const result=[];

    let name="";
    let logo="";
    let group="อื่นๆ";

    let drm=false;
    let keyId="";
    let key="";

    for(const line of lines){

        const l=line.trim();

        if(!l) continue;

        if(l.startsWith("#EXTINF")){

            const g=l.match(/group-title="([^"]+)"/);
            const lg=l.match(/tvg-logo="([^"]+)"/);

            group=g ? g[1] : "อื่นๆ";
            logo=lg ? lg[1] : "";

            name=l.split(",").pop().trim();

            drm=false;
            keyId="";
            key="";
        }

        else if(
            l.includes("license_key=")
        ){

            const data=l.split("license_key=")[1];

            if(data.includes(":")){

                const parts=data.split(":");

                drm=true;
                keyId=parts[0].trim();
                key=parts[1].trim();
            }
        }

        else if(
            l.startsWith("http")
        ){

            if(!name){

                name="Unknown Channel";
            }

            result.push({

                name,
                logo,
                group,

                url:l,

                drm,
                keyId,
                key
            });
        }
    }

    return result;
}

// =========================
// HLS PLAYER
// =========================

function fallbackPlay(url){

    document.getElementById("player").style.display="none";
    fallbackVideo.style.display="block";

    if(hls){
        hls.destroy();
        hls=null;
    }

    fallbackVideo.pause();
    fallbackVideo.removeAttribute("src");

    if(Hls.isSupported()){

        hls=new Hls({
            enableWorker:true,
            lowLatencyMode:true
        });

        hls.loadSource(url);
        hls.attachMedia(fallbackVideo);

        hls.on(Hls.Events.MANIFEST_PARSED,()=>{

            fallbackVideo.play().catch(()=>{});

        });

    }
    else if(fallbackVideo.canPlayType("application/vnd.apple.mpegurl")){

        fallbackVideo.src=url;

        fallbackVideo.play().catch(()=>{});
    }
}

// =========================
// JW PLAYER
// =========================

function playJW(channel){

    fallbackVideo.pause();

    document.getElementById("player").style.display="block";
    fallbackVideo.style.display="none";

    let config={

        file:channel.url,

        width:"100%",

        aspectratio:"16:9",

        autostart:true
    };

    if(
        channel.url
        .toLowerCase()
        .includes(".mpd")
    ){

        config.type="dash";

        if(channel.drm){

            config.drm={

                clearkey:{

                    keyId:channel.keyId,

                    key:channel.key

                }

            };
        }
    }

    try{

        if(!jw){

            jw=jwplayer("player")
            .setup(config);

        }else{

            jw.remove();

            jw=jwplayer("player")
            .setup(config);
        }

    }catch(e){

        console.log(e);
    }
}

// =========================
// PLAY CHANNEL
// =========================

function playChannel(channel){

    currentChannel=channel;

    localStorage.setItem(
        "lastChannel",
        JSON.stringify(channel)
    );

    current.textContent=
    "กำลังเล่น : "+channel.name;

    document
    .querySelectorAll(".item")
    .forEach(el=>
        el.classList.remove(
            "active-channel"
        )
    );

    const active=document.querySelector(
        `[data-url="${channel.url}"]`
    );

    if(active)
        active.classList.add(
            "active-channel"
        );

    const url=
    channel.url.toLowerCase();

    if(url.includes(".m3u8")){

        fallbackPlay(
            channel.url
        );

    }

    else if(url.includes(".mpd")){

        playJW(channel);

    }

    else{

        playJW(channel);
    }
}

// =========================
// RENDER LIST
// =========================

function renderList(list){

    playlist.innerHTML="";

    list.forEach(ch=>{

        const div=document.createElement("div");

        div.className="item";

        div.dataset.url=ch.url;

        div.innerHTML=`
        <img
        src="${ch.logo}"
        onerror="this.src='https://via.placeholder.com/60'">

        <div>
            <div>${ch.name}</div>
            <small>${ch.group}</small>
        </div>
        `;

        div.onclick=()=>playChannel(ch);

        playlist.appendChild(div);
    });
}

// =========================
// GROUPS
// =========================

function renderGroups(){

    const groups=[
        ...new Set(
            channels.map(c=>c.group)
        )
    ];

    const groupDiv=
        document.createElement("div");

    groupDiv.className="groups";

    playlist.parentNode.insertBefore(
        groupDiv,
        playlist
    );

    groups.forEach((g,index)=>{

        const btn=
            document.createElement("button");

        btn.className="group-btn";

        if(index===0)
            btn.classList.add("active");

        btn.textContent=g;

        btn.onclick=()=>{

            document
            .querySelectorAll(".group-btn")
            .forEach(b=>
                b.classList.remove("active")
            );

            btn.classList.add("active");

            renderList(
                channels.filter(
                    c=>c.group===g
                )
            );
        };

        groupDiv.appendChild(btn);
    });

    renderList(
        channels.filter(
            c=>c.group===groups[0]
        )
    );
}

// =========================
// โค้ดเสริม
// =========================
let selectedIndex=0;
let selectedGroup=0;

function focusItem(index){

    const items=
    document.querySelectorAll(".item");

    if(!items.length) return;

    items.forEach(i=>
        i.classList.remove("tv-focus")
    );

    if(index<0)
        index=items.length-1;

    if(index>=items.length)
        index=0;

    selectedIndex=index;

    items[index]
    .classList
    .add("tv-focus");

    items[index].scrollIntoView({

        behavior:"smooth",

        block:"nearest"

    });
}

function changeGroup(dir){

    const groups=
    document.querySelectorAll(
        ".group-btn"
    );

    if(!groups.length) return;

    selectedGroup+=dir;

    if(selectedGroup<0)
        selectedGroup=
        groups.length-1;

    if(
        selectedGroup>=
        groups.length
    ){
        selectedGroup=0;
    }

    groups[selectedGroup].click();

    setTimeout(()=>{

        focusItem(0);

    },200);
}

document.addEventListener(
"keydown",
function(e){

    switch(e.keyCode){

        case 38:
            focusItem(
                selectedIndex-1
            );
            break;

        case 40:
            focusItem(
                selectedIndex+1
            );
            break;

        case 37:
            changeGroup(-1);
            break;

        case 39:
            changeGroup(1);
            break;

        case 13:

            const items=
            document.querySelectorAll(
                ".item"
            );

            if(
                items[selectedIndex]
            ){

                items[
                    selectedIndex
                ].click();
            }

            break;

        case 166:

            focusItem(
                selectedIndex+1
            );

            const up=
            document.querySelectorAll(
                ".item"
            );

            if(up[selectedIndex])
                up[selectedIndex]
                .click();

            break;

        case 167:

            focusItem(
                selectedIndex-1
            );

            const down=
            document.querySelectorAll(
                ".item"
            );

            if(down[selectedIndex])
                down[selectedIndex]
                .click();

            break;
    }
});
