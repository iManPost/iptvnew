<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExoPlayer MPD/M3U8 Player</title>
<!-- รวมไลบรารี ExoPlayer จาก CDN -->
<script src="https://cdn.jsdelivr.net/npm/@cloudinary/exoplayer/dist/exoplayer.min.js"></script>
<style>
  body {
    background-color: #121212;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  /* UI คล้ายในภาพ */
  #playerContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  #videoPlayer {
    width: 100%;
    max-width: 800px;
    height: 450px;
    background-color: #000;
  }

  #controls {
    margin-top: 10px;
    display: flex;
    gap: 10px;
  }

  button {
    background-color: #333;
    border: none;
    padding: 10px 20px;
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    border-radius: 5px;
  }

  button:hover {
    background-color: #555;
  }

  /* รายการ playlist */
  #playlist {
    margin-top: 20px;
    width: 100%;
    max-width: 800px;
  }

  .playlist-item {
    padding: 10px;
    background: #222;
    margin-bottom: 5px;
    cursor: pointer;
    border-radius: 4px;
  }

  .playlist-item:hover {
    background: #444;
  }
</style>
</head>
<body>

<div id="playerContainer">
  <!-- Video Player -->
  <div id="videoPlayer"></div>

  <!-- ควบคุม -->
  <div id="controls">
    <button id="playBtn">เล่น</button>
    <button id="pauseBtn">หยุด</button>
  </div>

  <!-- รายการ playlist -->
  <div id="playlist">
    <h3>รายการไฟล์</h3>
    <div class="playlist-item" data-url="http://54.37.19.157/history/tracks-v1a1/mono.m3u8">ไฟล์ 1 (M3U8)</div>
    <div class="playlist-item" data-url="https://example.com/video2.mpd">ไฟล์ 2 (MPD)</div>
    <!-- เพิ่มไฟล์เพิ่มเติมได้ตามต้องการ -->
  </div>
</div>

<script>
  // สร้าง ExoPlayer
  const player = new cloudinary.exoplayer.ExoPlayer({
    target: document.getElementById('videoPlayer'),
  });

  // ฟังก์ชันโหลดไฟล์
  function loadMedia(url) {
    player.load(url);
  }

  // ควบคุมปุ่ม
  document.getElementById('playBtn').addEventListener('click', () => {
    player.play();
  });

  document.getElementById('pauseBtn').addEventListener('click', () => {
    player.pause();
  });

  // เลือกไฟล์จาก playlist
  document.querySelectorAll('.playlist-item').forEach(item => {
    item.addEventListener('click', () => {
      const url = item.getAttribute('data-url');
      loadMedia(url);
    });
  });

  // เริ่มเล่นไฟล์แรกเป็นตัวอย่าง
  // loadMedia('https://example.com/video1.m3u8');
</script>

</body>
</html>
