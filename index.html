<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player - JW + HLS</title>

<!-- JW PLAYER -->
<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
    jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";
</script>

<!-- HLS.js fallback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.container{ max-width:1000px; margin:auto; }

.player{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}

.current{
    padding:15px 0;
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}

.playlist{
    background:#1c1c1c;
    border-radius:10px;
    overflow:hidden;
}

.item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #333;
}

.item:hover{ background:#2a2a2a; }

.item img{
    width:60px;
    height:60px;
    object-fit:contain;
    background:#fff;
    border-radius:6px;
}

.groups{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin:15px 0;
    padding-bottom:10px;
}

.group-btn{
    border:none;
    padding:10px 16px;
    border-radius:20px;
    background:#222;
    color:#fff;
    cursor:pointer;
    white-space:nowrap;
}

.group-btn.active{
    background:#00ff88;
    color:#000;
    font-weight:bold;
}

video{
    width:100%;
    height:100%;
}
</style>

</head>

<body>

<div class="container">

<!-- JW PLAYER -->
<div id="player" class="player"></div>

<!-- fallback HLS -->
<video id="fallbackVideo" controls autoplay playsinline style="display:none;"></video>

<div id="current" class="current">เลือกช่องเพื่อเริ่มเล่น</div>

<div id="playlist" class="playlist"></div>

</div>

<script>

// ---------------- DATA ----------------
const m3uData = `
#EXTINF:-1 group-title="ช่องดิจิตอล" tvg-logo="",CH3 HD
https://lb-gmmz.sky-cdn.com/gmm/ch3.m3u8

#EXTINF:-1 group-title="บอลโลก" tvg-logo="",BALL
https://raw.githubusercontent.com/Bluestraveller13/super-duper-spork/284b0094ab4f339fe29f54d096eeb381f69395d2/CazeTV.m3u8

#EXTINF:-1 group-title="หนังภาพยนตร์" tvg-logo="",RED BULL TV
https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master_3360.m3u8
`;

// ---------------- ELEMENTS ----------------
const playlist = document.getElementById("playlist");
const current = document.getElementById("current");
const fallbackVideo = document.getElementById("fallbackVideo");

// ---------------- GLOBAL ----------------
let channels = [];
let jw;
let hls;

// ---------------- PARSE ----------------
function parseM3U(text){
    const lines = text.split("\n");
    const result = [];

    let name="", logo="", group="";

    for(const line of lines){
        const l = line.trim();

        if(l.startsWith("#EXTINF")){
            const g = l.match(/group-title="([^"]+)"/);
            const lg = l.match(/tvg-logo="([^"]+)"/);

            group = g ? g[1] : "อื่นๆ";
            logo = lg ? lg[1] : "";
            name = l.split(",").pop().trim();
        }

        else if(l.startsWith("http")){
            result.push({ name, logo, group, url: l });
        }
    }

    return result;
}

// ---------------- PLAY FUNCTION ----------------
function playChannel(channel){

    current.textContent = "กำลังเล่น: " + channel.name;

    // reset fallback
    fallbackVideo.style.display = "none";
    document.getElementById("player").style.display = "block";

    try{

        // first init
        if(!jw){
            jw = jwplayer("player").setup({
                width: "100%",
                aspectratio: "16:9",
                file: channel.url,
                autostart: true
            });

            jw.on("error", () => {
                console.log("JW fail → fallback");
                fallbackPlay(channel.url);
            });

        } else {
            jw.load([{ file: channel.url }]);
            jw.play();
        }

    } catch(e){
        console.log("JW crash → fallback");
        fallbackPlay(channel.url);
    }
}

// ---------------- FALLBACK HLS ----------------
function fallbackPlay(url){

    document.getElementById("player").style.display = "none";
    fallbackVideo.style.display = "block";

    if(hls) hls.destroy();

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(fallbackVideo);

        hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
            fallbackVideo.play().catch(()=>{});
        });

    } else if(fallbackVideo.canPlayType("application/vnd.apple.mpegurl")){
        fallbackVideo.src = url;
        fallbackVideo.play();
    }
}

// ---------------- RENDER LIST ----------------
function renderList(list){

    playlist.innerHTML = "";

    list.forEach(ch=>{
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/60'">
            <div>
                <div>${ch.name}</div>
                <small>${ch.group}</small>
            </div>
        `;

        div.onclick = ()=>playChannel(ch);
        playlist.appendChild(div);
    });
}

// ---------------- GROUP ----------------
function renderGroups(){

    const groups = [...new Set(channels.map(c=>c.group))];

    const groupDiv = document.createElement("div");
    groupDiv.className = "groups";
    playlist.parentNode.insertBefore(groupDiv, playlist);

    groups.forEach((g,i)=>{
        const btn = document.createElement("button");
        btn.className = "group-btn";
        btn.textContent = g;

        if(i===0) btn.classList.add("active");

        btn.onclick = ()=>{
            document.querySelectorAll(".group-btn")
            .forEach(b=>b.classList.remove("active"));

            btn.classList.add("active");

            renderList(channels.filter(c=>c.group===g));
        };

        groupDiv.appendChild(btn);
    });

    renderList(channels.filter(c=>c.group===groups[0]));
    playChannel(channels[0]);
}

// ---------------- INIT ----------------
channels = parseM3U(m3uData);
renderGroups();

</script>

</body>
</html>
